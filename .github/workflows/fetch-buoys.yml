name: Fetch Buoy Data

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch buoy + weather data
        run: |
          python3 << 'PYEOF'
import urllib.request, urllib.parse, json, os
from datetime import datetime, timedelta, timezone

now   = datetime.now(timezone.utc)
start = (now - timedelta(hours=48)).strftime('%Y-%m-%dT%H:00:00Z')

STATIONS = [
  {'id':'46025','name':'Santa Monica Basin','role':'Offshore · Period + Direction','lat':33.755,'lon':-119.045,'depth':'890m'},
  {'id':'46221','name':'Santa Monica Bay',  'role':'Inner Confirm · Wave Height',  'lat':33.860,'lon':-118.641,'depth':'387m'},
  {'id':'46268','name':'Topanga Nearshore', 'role':'NW Early Warning',             'lat':34.022,'lon':-118.578,'depth':'~20m'},
  {'id':'ICAC1','name':'Santa Monica Pier', 'role':'Wind & Tide Shore Station',    'lat':34.008,'lon':-118.500,'depth':'Shore'},
  {'id':'46222','name':'San Pedro',         'role':'South Swell Detector',         'lat':33.614,'lon':-118.314,'depth':'483m'},
  {'id':'46253','name':'San Pedro South',   'role':'Redondo Nearshore',            'lat':33.576,'lon':-118.181,'depth':'66m'},
]

HDR = {'User-Agent':'Mozilla/5.0 SouthBayHub/1.0','Accept':'application/json'}

def get(url):
    req = urllib.request.Request(url, headers=HDR)
    with urllib.request.urlopen(req, timeout=20) as r:
        return json.loads(r.read())

def erddap(sid):
    base  = 'https://coastwatch.pfeg.noaa.gov/erddap/tabledap/cwwcNDBCMet.json'
    query = f'station,time,wd,wspd,wvht,dpd,mwd,atmp,wtmp&station="{sid}"&time>={start}&orderByMax("time")'
    url   = f'{base}?{urllib.parse.quote(query, safe="=&,.()\">=<!*")}'
    print(f'  {url[:100]}...')
    data  = get(url)
    cols  = data['table']['columnNames']
    rows  = data['table']['rows']
    if not rows:
        return None
    row = dict(zip(cols, rows[-1]))
    def v(k):
        x = row.get(k)
        if x is None: return None
        try:
            f = float(x)
            return None if f >= 99 else round(f, 3)
        except: return None
    wvht,dpd,wspd,wtmp,atmp = v('wvht'),v('dpd'),v('wspd'),v('wtmp'),v('atmp')
    return {
        'wvht_ft':  round(wvht*3.281,1) if wvht is not None else None,
        'wvht_m':   wvht, 'dpd_s': dpd, 'mwd_deg': v('mwd'),
        'wspd_mph': round(wspd*2.237,1) if wspd is not None else None,
        'wdir_deg': v('wd'),
        'wtmp_f':   round(wtmp*9/5+32,1) if wtmp is not None else None,
        'atmp_f':   round(atmp*9/5+32,1) if atmp is not None else None,
        'timestamp': row.get('time','?'),
    }

sunrise = sunset = None
try:
    wx = get('https://api.open-meteo.com/v1/forecast?latitude=33.88&longitude=-118.41&daily=sunrise,sunset&timezone=America%2FLos_Angeles&forecast_days=1')
    sunrise = wx['daily']['sunrise'][0]
    sunset  = wx['daily']['sunset'][0]
    print(f'Sun: {sunrise} / {sunset}')
except Exception as e:
    print(f'Sun failed: {e}')

result = {'fetched_at':now.isoformat(),'sunrise':sunrise,'sunset':sunset,'stations':{},'errors':{}}

for st in STATIONS:
    sid = st['id']
    print(f'\nFetching {sid}...')
    try:
        d = erddap(sid)
        result['stations'][sid] = {**st,'data':d,'ok':d is not None}
        print(f'  OK: wvht={d.get("wvht_ft") if d else None}ft dpd={d.get("dpd_s") if d else None}s')
    except Exception as e:
        result['stations'][sid] = {**st,'data':None,'ok':False}
        result['errors'][sid] = str(e)
        print(f'  ERROR: {e}')

os.makedirs('src/data', exist_ok=True)
with open('src/data/buoy-data.json','w') as f:
    json.dump(result, f, indent=2)

live = sum(1 for s in result['stations'].values() if s.get('ok'))
print(f'\n=== {live}/{len(STATIONS)} stations live ===')
PYEOF

      - name: Commit buoy data only
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/buoy-data.json
          git diff --staged --quiet || git commit -m "chore: buoy data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
